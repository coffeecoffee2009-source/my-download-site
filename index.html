
<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>檔案下載與資料查詢</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 20px;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: left;
    }
    th {
      background: #f2f2f2;
    }
    a.button {
      display: inline-block;
      margin: 10px 0;
      padding: 10px 15px;
      background: #1976d2;
      color: white;
      text-decoration: none;
      border-radius: 4px;
    }
  </style>
</head>
<body>

<h1>工具下載與資料查詢</h1>

<h2>📁 檔案下載清單</h2>
<table id="downloadTable" border="1" cellpadding="8"></table>

<script>
const sheetId = "https://docs.google.com/spreadsheets/d/1gLvBHhuljUspnbiwhbWwMZhNjXZd_6NXrlUHjzegK1k/edit?gid=0#gid=0";
const sheetUrl =
  `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;

fetch(sheetUrl)
  .then(res => res.text())
  .then(text => {
    const json = JSON.parse(text.substring(47).slice(0, -2));
    const table = document.getElementById("downloadTable");

    // 表頭
    table.innerHTML = `
      <tr>
        <th>名稱</th>
        <th>說明</th>
        <th>下載</th>
        <th>類型</th>
      </tr>
    `;

    // 資料列
    json.table.rows.forEach(row => {
      const name = row.c[0]?.v || "";
      const desc = row.c[1]?.v || "";
      const url  = row.c[2]?.v || "#";
      const type = row.c[3]?.v || "";

      table.innerHTML += `
        <tr>
          <td>${name}</td>
          <td>${desc}</td>
          <td>
            <a href="${url}" target="_d>
          <td>${type}</td>
        </tr>
      `;
    });
  });
</script>
