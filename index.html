<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>工具下載與資料查詢</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont,
                   "Segoe UI", "Noto Sans TC", Arial, sans-serif;
      margin: 40px;
    }

    h1 {
      color: #0d47a1;
      margin-bottom: 20px;
    }

    h2 {
      color: #1a237e;
      margin-top: 40px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 16px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 8px 10px;
      text-align: left;
    }

    th {
      background-color: #e3f2fd;
    }

    a {
      color: #1976d2;
      text-decoration: none;
      font-weight: 600;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <h1>工具下載與資料查詢</h1>

  <h2>📁 檔案下載清單</h2>

  <table id="downloadTable"></table>

  <script>
   
    const sheetId = "docs.google.com/spreadsheets/d/1gLvBHhuljUspnbiwhbWwMZhNjXZd_6NXrlUHjzegK1k/edit?gid=0#gid=0";

    const sheetUrl =
      `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;

    fetch(sheetUrl)
      .then(res => res.text())
      .then(text => {
        const json = JSON.parse(text.substring(47).slice(0, -2));
        const table = document.getElementById("downloadTable");

        // 表頭
        table.innerHTML = `
          <tr>
            <th>名稱</th>
            <th>說明</th>
            <th>下載</th>
            <th>類型</th>
          </tr>
        `;

        // 資料列
        json.table.rows.forEach(row => {
          const name = row.c[0]?.v || "";
          const desc = row.c[1]?.v || "";
          const url  = row.c[2]?.v || "#";
          const type = row.c[3]?.v || "";

          table.innerHTML += `
            <tr>
              <td>${name}</td>
              <td>${desc}</td>
              <td>
                <a href="${url             </td>
              <td>${type}</td>
            </tr>
          `;
        });
      })
      .catch(() => {
        document.getElementById("downloadTable").innerHTML =
          "<tr><td>❌ 無法讀取資料，請確認試算表 ID 與權限</td></tr>";
      });
  </script>

</body>
</html>
