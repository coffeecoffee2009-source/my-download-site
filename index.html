<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>工具資料查詢</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont,
                   "Segoe UI", "Noto Sans TC", Arial, sans-serif;
      margin: 40px;
    }

    h1 {
      color: #0d47a1;
    }

    .search-box {
      margin: 20px 0;
    }

    .search-box input {
      padding: 8px;
      width: 300px;
      font-size: 14px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: left;
    }

    th {
      background: #e3f2fd;
    }

    .count {
      margin: 8px 0;
      font-size: 13px;
      color: #555;
    }
  </style>
</head>

<body>

  <h1>工具資料查詢</h1>

  <div class="search-box">
    <input
      type="text"
      id="searchInput"
      placeholder="🔍 搜尋 名稱 / 說明 / 類型"
    >
    <div class="count" id="resultCount"></div>
  </div>

  <table id="dataTable"></table>

  <script>
    // ✅ 換成你的 Google 試算表 ID
    const sheetId = "1LvBHHuljUspnbWbhWMZhNjXZd_6NXr1UHjzegK1k";

    const sheetUrl =
      `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;

    let allRows = [];

    fetch(sheetUrl)
      .then(res => res.text())
      .then(text => {
        const json = JSON.parse(text.substring(47).slice(0, -2));
        allRows = json.table.rows || [];
        renderTable(allRows);
      });

    function renderTable(rows) {
      const table = document.getElementById("dataTable");
      const count = document.getElementById("resultCount");

      table.innerHTML = `
        <tr>
          <th>名稱</th>
          <th>說明</th>
          <th>類型</th>
        </tr>
      `;

      rows.forEach(row => {
        const name = row.c[0]?.v || "";
        const desc = row.c[1]?.v || "";
        const type = row.c[2]?.v || "";

        table.innerHTML += `
          <tr>
            <td>${name}</td>
            <td>${desc}</td>
            <td>${type}</td>
          </tr>
        `;
      });

      count.textContent = `顯示 ${rows.length} 筆資料`;
    }
